<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Cloud Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 80%;
            max-width: 800px;
            text-align: center;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            font-size: 16px;
        }
        button {
            margin-top: 15px;
            padding: 12px 25px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        #cloud-container {
            margin-top: 30px;
            width: 100%;
            min-height: 400px;
            border: 1px dashed #ccc;
            border-radius: 8px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            background: #fafafa;
        }
        .word {
            margin: 5px;
            transition: transform 0.2s;
            cursor: default;
            display: inline-block;
        }
        .word:hover {
            transform: scale(1.2);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Word Cloud Generator</h2>
    <p>Paste your text below to see which words appear most often.</p>
    <textarea id="textInput" placeholder="Enter your text here..."></textarea>
    <br>
    <button onclick="generateCloud()">Generate Word Cloud</button>

    <div id="cloud-container">
        </div>
</div>

<script>
    function generateCloud() {
        const text = document.getElementById('textInput').value;
        const container = document.getElementById('cloud-container');
        container.innerHTML = ''; // Clear previous cloud

        if (!text.trim()) {
            alert("Please enter some text!");
            return;
        }

        // 1. Clean text and count frequencies
        const words = text.toLowerCase()
            .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, "")
            .split(/\s+/);

        const freqMap = {};
        words.forEach(w => {
            if (w.length > 2) { // Ignore tiny words like 'a', 'to'
                freqMap[w] = (freqMap[w] || 0) + 1;
            }
        });

        // 2. Sort and limit to top 50 words
        const sortedWords = Object.entries(freqMap)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 50);

        // 3. Create elements
        const maxFreq = sortedWords[0][1];
        
        sortedWords.forEach(([word, freq]) => {
            const span = document.createElement('span');
            span.className = 'word';
            span.innerText = word;
            
            // Calculate dynamic font size based on frequency
            // Formula: base size + (relative scale * multiplier)
            const fontSize = 16 + (freq / maxFreq * 60);
            span.style.fontSize = `${fontSize}px`;
            
            // Randomize colors
            const colors = ['#2c3e50', '#e74c3c', '#3498db', '#27ae60', '#f39c12', '#8e44ad'];
            span.style.color = colors[Math.floor(Math.random() * colors.length)];
            
            container.appendChild(span);
        });
    }
</script>

</body>
</html>
